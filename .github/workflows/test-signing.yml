name: "Test Helm-Unittest Release Signing"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-signing:
    name: run signing test via reusable release workflow
    uses: ./.github/workflows/release.yml
    with:
      run_release_job: true
      oci_tag_suffix: -alpha
      oci_tag_latest: false
      publish_release_artifacts: false
      run_docker_publish: false
    secrets:
      GPG_KEYRING_BASE64: ${{ secrets.GPG_KEYRING_BASE64 }}
      GPG_PASSPHRASE_BASE64: ${{ secrets.GPG_PASSPHRASE_BASE64 }}